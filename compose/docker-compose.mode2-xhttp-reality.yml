services:
  nginx:
    image: nginx:1.27-alpine
    container_name: beta-nginx
    restart: unless-stopped
    depends_on:
      - xray
    ports:
      - "${XRAY_PORT:-8443}:8443/tcp"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro

  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: beta-xray
    restart: unless-stopped
    command: ["run", "-config", "/etc/xray/config.json"]
    expose:
      - "443"
    volumes:
      - ./config/xray.json:/etc/xray/config.json:ro

  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: beta-3x-ui
    restart: unless-stopped
    ports:
      - "${XUI_PORT:-2053}:2053/tcp"
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      X_UI_ENABLE_FAIL2BAN: "true"
    volumes:
      - x-ui-data:/etc/x-ui/
      - x-ui-cert:/root/cert/

  reality-alert:
    build:
      context: .
      dockerfile: Dockerfile.reality-alert
    container_name: beta-reality-alert
    restart: unless-stopped
    depends_on:
      - xray
    env_file:
      - .env
    environment:
      XRAY_CONTAINER: beta-xray
      BETA_PROJECT_DIR: /beta
      BETA_PROJECT_DIR_HOST: "${BETA_PROJECT_DIR_HOST:-/beta}"
      REALITY_ALERT_COOLDOWN_SECONDS: "${REALITY_ALERT_COOLDOWN_SECONDS:-300}"
      REALITY_ALERT_STARTUP_TEST_ENABLED: "${REALITY_ALERT_STARTUP_TEST_ENABLED:-1}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BETA_PROJECT_DIR_HOST:-.}:/beta

volumes:
  x-ui-data:
  x-ui-cert:
