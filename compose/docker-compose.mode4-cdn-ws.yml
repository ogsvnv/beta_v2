services:
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: beta-3x-ui
    restart: unless-stopped
    ports:
      - "${XUI_PORT:-2053}:2053/tcp"
      - "${XRAY_PORT:-80}:10000/tcp"
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      X_UI_ENABLE_FAIL2BAN: "true"
    volumes:
      - x-ui-data:/etc/x-ui/
      - x-ui-cert:/root/cert/

volumes:
  x-ui-data:
  x-ui-cert:
