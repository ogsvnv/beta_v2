services:
  nginx:
    image: nginx:1.27-alpine
    container_name: gamma-nginx
    restart: unless-stopped
    depends_on:
      - xray
    ports:
      - "${XRAY_PORT:-8443}:8443/tcp"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: gamma-xray
    restart: unless-stopped
    command: ["run", "-config", "/etc/xray/config.json"]
    expose:
      - "443"
      - "10000"
    volumes:
      - ./config/xray.json:/etc/xray/config.json:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  reality-alert:
    build:
      context: .
      dockerfile: Dockerfile.reality-alert
    container_name: gamma-reality-alert
    restart: unless-stopped
    depends_on:
      - xray
    env_file:
      - .env
    environment:
      XRAY_CONTAINER: gamma-xray
      GAMMA_PROJECT_DIR: /gamma
      GAMMA_PROJECT_DIR_HOST: "${GAMMA_PROJECT_DIR_HOST:-/gamma}"
      REALITY_ALERT_COOLDOWN_SECONDS: "${REALITY_ALERT_COOLDOWN_SECONDS:-300}"
      REALITY_ALERT_STARTUP_TEST_ENABLED: "${REALITY_ALERT_STARTUP_TEST_ENABLED:-1}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${GAMMA_PROJECT_DIR_HOST:-.}:/gamma
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
